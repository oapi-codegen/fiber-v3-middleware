name: CI
on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  build:
    uses: oapi-codegen/actions/.github/workflows/ci.yml@6cf35d4f044f2663dae54547ff6d426e565beb48 # v0.6.0
    with:
      lint_versions: '["1.25"]'
      # The module requires Go 1.25+ (fiber/v3), so exclude 1.24 from the default matrix.
      excluding_versions: '["1.24"]'
